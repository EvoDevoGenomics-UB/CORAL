name: Tests

on:
  push:
    branches: [ "main" , "snakemake" ]
  pull_request:
    branches: [ "main" ]

jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
    - name: Linting
      uses: snakemake/snakemake-github-action@v2.0.1
      with:
        directory: .test
        snakefile: Snakefile
        args: "--configfile .test/config.yaml --lint"

  run-workflow:
    runs-on: ubuntu-latest
    needs:
      - linting
    steps:
    - name: Checkout repository with submodules
      uses: actions/checkout@v5
      with:
        submodules: recursive
    - name: Test workflow
      uses: snakemake/snakemake-github-action@v2.0.1
      with:
        directory: .test
        snakefile: Snakefile
        args: "--configfile .test/config.yaml --use-conda --show-failed-logs --cores 2 --conda-cleanup-pkgs cache"
        show-disk-usage-on-error: true
